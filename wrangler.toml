# C.H.E.T. Wrangler Configuration
name = "chet"
main = "dist/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

routes = [
  { pattern = "chet.distorted.work", custom_domain = true }
]

upload_source_maps = true

# Static assets for the frontend
[assets]
binding = "ASSETS"
directory = "./public"

# Enable observability
[observability]
enabled = true

# AI binding for Workers AI
[ai]
binding = "AI"

# Fallback for local dev
[ai.dev]
local = true


# KV namespace for prompts, MCP servers and other data
[[kv_namespaces]]
binding = "CHET_KV"
id = "07fb69cb761049c6ba59250c50135039"

# Public route

# Build settings for Vite
[build]
command = "npm run build"
watch_dir = ["src", "public"]

# Durable Object binding for the ChetAgent
[[durable_objects.bindings]]
name = "ChetAgent"
class_name = "ChetAgent"

# Migration for the ChetAgent Durable Object
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChetAgent"]

# Development settings
[dev]
port = 8787
local_protocol = "http"

# Email Sending Beta Binding
[[send_email]]
name = "SEND_EMAIL"

# Vectorize Index for RAG



# Vectorize Index for RAG
[[vectorize]]
binding = "VECTORIZE_INDEX"
index_name = "chet-rag-index"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "chet-users-d1"
database_id = "e289cfe2-d7ad-48bc-b7e5-b12be53d7869"
